services:
  - type: web
    name: epostai-backend
    runtime: python
    repo: https://github.com/Swaroopankaj/epostAI
    branch: master
    buildCommand: cd app/backend && pip install -r requirements.txt
    startCommand: cd app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://epostai.agenticworkflow.space
